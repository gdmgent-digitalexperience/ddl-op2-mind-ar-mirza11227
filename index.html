<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Augmented Reality Projects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
            font-size: 2.5em;
        }
        
        .projects {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .project-link {
            display: block;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-size: 1.1em;
            text-align: center;
            font-weight: bold;
        }
        
        .project-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .project-link.alt {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .project-link.alt:hover {
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AR Projects</h1>
        <div class="projects">
            <a href="in_de_les/ddl-op2-mind-ar-rogerthat-be/index.html" class="project-link">
                In de Les
            </a>
            <a href="voorbereiding/index.html" class="project-link alt">
                Voorbereiding
            </a>
        </div>
    </div>
</body>
</html>
