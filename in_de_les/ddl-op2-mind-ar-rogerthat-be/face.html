<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene
      mindar-face
      embedded
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera active="false" position="0 0 0"></a-camera>

      <a-assests>
        <a-asset-item id="face-model" src="assets/pink_round_sunglasses.glb"></a-asset-item>
        <a-asset-item id="face-model2" src="assets/Soldier.glb"></a-asset-item>
      </a-assests>

      <a-entity mindar-face-target="anchorIndex: 5">
        <a-gltf-model src="#face-model"></a-gltf-model>
      </a-entity>

      <a-entity mindar-face-target="anchorIndex: 5">
        <a-gltf-model src="#face-model2"></a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
